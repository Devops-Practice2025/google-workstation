trigger:
- none

pool:
  vmImage: ubuntu-latest

variables:
  image_project: optimum-parity-492514-s8
  move_project: magnetic-abode-492609-i1
  zone: europe-west1-b
  instance_name: instance-20260403-151047
  snapshot_name: temp-snapshot-for-move
  image_name: image-for-move

steps:
- task: DownloadSecureFile@1
  name: gcpkey
  inputs:
    secureFile: key.json

- script: |
    set -e

    echo "Authenticating to Google Cloud"
    gcloud auth activate-service-account \
      --key-file=$(gcpkey.secureFilePath)

    gcloud config set project $(image_project)
    gcloud auth list

    echo "Creating snapshot from disk"
    gcloud compute disks snapshot $(instance_name) \
      --project=$(image_project) \
      --zone=$(zone) \
      --snapshot-names=$(snapshot_name)

    echo "Creating image from snapshot"
    gcloud compute images create $(image_name) \
      --project=$(image_project) \
      --source-snapshot=$(snapshot_name)

    gcloud compute images list --project=$(image_project)

    echo "Getting project number for move project"
    PROJECT_NUMBER=$(gcloud projects describe $(move_project) --format="value(projectNumber)")
    echo "Move project number: $PROJECT_NUMBER"

    echo "Granting imageUser role"
    gcloud projects add-iam-policy-binding $(image_project) \
      --member="serviceAccount:${PROJECT_NUMBER}-compute@developer.gserviceaccount.com" \
      --role="roles/compute.imageUser"

    echo "Creating VM in move project"
    gcloud compute instances create $(instance_name) \
      --project=$(move_project) \
      --zone=$(zone) \
      --machine-type=e2-standard-4 \
      --image=$(image_name) \
      --image-project=$(image_project)

  displayName: "Snapshot → Image → Cross-project VM creation"
