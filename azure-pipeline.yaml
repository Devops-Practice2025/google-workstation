trigger: none
pr: none

pool:
  vmImage: 'ubuntu-latest'

jobs:
- job: GCPJob
  displayName: 'Authenticate to GCP'
  steps:
  - checkout: self

  - task: Bash@3
    displayName: "Decode GCP Key and Authenticate"
    inputs:
      targetType: "inline"
      script: |
        echo "$GCLOUD_KEY_BASE64" | base64 --decode > key.json

        echo "✅ JSON key decoded"

        gcloud auth activate-service-account --key-file=key.json
        gcloud config set project extreme-minutia-492415-v6

  - task: Bash@3
    displayName: "GCP Test Command"
    inputs:
      targetType: 'inline'
      script: |
        gcloud projects describe extreme-minutia-492415-v6