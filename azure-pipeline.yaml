trigger:
- none

pool:
  vmImage: ubuntu-latest

steps:
- task: DownloadSecureFile@1
  name: gcpkey
  inputs:
    secureFile: key.json

- script: |
    gcloud auth activate-service-account \
      --key-file=$(gcpkey.secureFilePath)
    gcloud config set project optimum-parity-492514-s8
    gcloud auth list
  displayName: Authenticate to Google Cloud